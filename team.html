[data-theme="dark"]{--bg:#000;--card:#1d1d1f;--text:#f5f5f7;--shadow:0 4px 20px rgba(0,0,0,0.3);--nav-bg:rgba(0,0,0,0.8);--footer-bg:#1d1d1f;--border:rgba(255,255,255,0.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);transition:.3s}
nav{position:fixed;top:0;left:0;width:100%;z-index:1000;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 48px;height:44px;display:flex;align-items:center;justify-content:space-between}

.main h1{font-size:36px;font-weight:700;margin-bottom:32px;text-align:center}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.member{background:var(--card);border-radius:18px;padding:28px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--border)}
.avatar{width:64px;height:64px;background:linear-gradient(135deg,#007aff,#5856d6);border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:28px}
.member h3{font-size:16px;font-weight:600;margin-bottom:4px}
.member p{color:var(--subtext);font-size:13px}
.desc{background:var(--card);border-radius:18px;padding:24px;margin-top:32px;box-shadow:var(--shadow);border:1px solid var(--border)}
.desc h3{font-size:18px;font-weight:600;margin-bottom:12px}
.desc p{color:var(--subtext);line-height:1.6}
footer{background:var(--footer-bg);padding:20px;text-align:center;color:var(--subtext);font-size:12px}
@media(max-width:768px){.nav-links{display:none}}
</style>
</head>
