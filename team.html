<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;
  --card:#1c1c1e;
  --card-hover:#2c2c2e;
  --text:#f5f5f7;
  --subtext:#8e8e93;
  --accent:#0a84ff;
  --border:#38383a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Noto Sans SC',-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  background-image:radial-gradient(ellipse at top,#1a1a2e 0%,#0a0a0a 50%);
}
nav{position:fixed;top:0;left:0;width:100%;z-index:1000;background:rgba(10,10,10,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,#ff375f,#bf5af2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:32px}
.nav-links a{color:var(--subtext);font-size:14px;text-decoration:none;transition:color 0.3s}
.nav-links a:hover{color:var(--text)}
.main{padding:120px 20px 60px;max-width:900px;margin:0 auto}
h1{font-size:42px;font-weight:700;text-align:center;margin-bottom:50px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}
.member{background:var(--card);border-radius:20px;padding:28px;text-align:center;border:1px solid var(--border);transition:all 0.3s}
.member:hover{background:var(--card-hover);transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,0.3)}
.avatar{width:64px;height:64px;background:linear-gradient(135deg,#0a84ff,#5856d6);border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:28px}
.member h3{font-size:16px;font-weight:600;margin-bottom:4px}
.member p{color:var(--subtext);font-size:13px}
.desc{background:var(--card);border-radius:20px;padding:28px;margin-top:40px;border:1px solid var(--border)}
.desc h3{font-size:18px;font-weight:600;margin-bottom:12px}
.desc p{color:var(--subtext);line-height:1.7}
footer{text-align:center;padding:40px;color:var(--subtext);font-size:13px}
.hero-glow{position:absolute;width:400px;height:400px;background:linear-gradient(135deg,#ff375f,#bf5af2);filter:blur(180px);opacity:0.1;top:0;left:50%;transform:translateX(-50%);z-index:-1}
@media(max-width:768px){.nav-links{display:none}}
</style>
</head>
